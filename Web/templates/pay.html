{% extends 'base.html' %}
{% block body %}

<div class="card shadow-sm p-4 fs-5 mx-auto" style="max-width: 500px;">
  <h3 class="mb-3">Оплата билета №{{ ticket.id }}</h3>
  
  <p><strong>Сумма к оплате:</strong> 500₽</p>
  <p><strong>Осталось времени:</strong>
     <span class="text-primary">{{ remaining }}</span> из {{ RESERVE_MIN }} мин.</p>
  
  <form method="post" action="/pay/{{ ticket.id }}/process" class="mt-4">
    <div class="mb-3">
      <label for="card" class="form-label">Номер карты</label>
      <input type="text" class="form-control form-control-lg" id="card" name="card"
             placeholder="Введите номер карты (fail — имитирует ошибку)" required>
    </div>
    <button type="submit" class="btn btn-success btn-lg w-100">
      Оплатить
    </button>
  </form>
  
  <div class="mt-3 text-center">
    <a href="/" class="text-decoration-none">&larr; Вернуться назад</a>
  </div>
</div>

{% endblock %}
